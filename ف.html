<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات بوت المساعد الذكي - WormGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --chat-bg: #15171e;
            --primary: #ff3344; 
            --primary-hover: #ff5566;
            --user-msg: #ff3344;
            --bot-msg: #212431;
            --text-light: #fdfdfd;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #chat-container {
            width: 100%;
            max-width: 650px;
            height: 88vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2d3e;
        }

        #chat-header {
            background: linear-gradient(135deg, var(--primary), #b31020);
            color: #fff;
            padding: 22px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(255, 51, 68, 0.25);
            letter-spacing: 1px;
        }

        #chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3f4555; border-radius: 10px; }

        .message {
            padding: 16px 22px;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.9;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            animation: fadeIn 0.3s ease-in-out;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: var(--user-msg);
            color: #fff;
            align-self: flex-start;
            border-top-right-radius: 5px;
            box-shadow: 0 4px 10px rgba(255, 51, 68, 0.15);
        }

        .bot-msg {
            background: var(--bot-msg);
            color: var(--text-light);
            align-self: flex-end;
            border-top-left-radius: 5px;
            border: 1px solid #2a2d3e;
        }

        #input-area {
            display: flex;
            padding: 18px;
            background: #0d0e12;
            border-top: 1px solid #2a2d3e;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            background: #212431;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
            border: 1px solid #2a2d3e;
        }

        #user-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(255, 51, 68, 0.25);
        }

        #send-btn {
            background: var(--primary);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px rgba(255, 51, 68, 0.3);
        }

        #send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.08);
        }

        .loading {
            align-self: flex-end;
            font-size: 1rem;
            color: #ff3344;
            background: transparent;
            padding: 0;
            font-weight: 800;
            border: none;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">🤖 WormGPT - الذكاء غير المقيد</div>
        <div id="chat-box">
            <div class="message bot-msg">أهلاً بك! تم تحديث جودة الخط ونظام القراءة ليكون أكثر دقة ووضوحاً. تفضل بكتابة رسالتك...</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        // إعدادات الـ API الجديدة بناءً على التوثيق
        const apiKey = 'wgpt_yef3zqejl79bmhaj5k0ppdxtymolek3crq3tjoto';
        const modelName = 'wormgpt-uncensored';
        const apiUrl = 'https://api.wormgpt.pw/v1/chat/completions';

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, 'user-msg');
            inputField.value = '';

            const chatBox = document.getElementById('chat-box');
            const loadingId = 'loading-' + Date.now();
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message loading';
            loadingMsg.id = loadingId;
            loadingMsg.textContent = 'جاري معالجة الرد... ⚡';
            chatBox.appendChild(loadingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [{ role: 'user', content: message }]
                    })
                });

                const responseText = await response.text();
                
                let finalResponseText = "";
                let serverError = "";
                
                try {
                    let jsonResponse = JSON.parse(responseText);
                    if (jsonResponse.choices && jsonResponse.choices.length > 0) {
                        finalResponseText = jsonResponse.choices[0].message.content;
                    } else if (jsonResponse.content) {
                        finalResponseText = jsonResponse.content;
                    } else if (jsonResponse.error) {
                        serverError = jsonResponse.error.message || jsonResponse.error;
                    }
                } catch (e) {
                    const lines = responseText.split('\n');
                    for (let line of lines) {
                        if (line.trim().startsWith('data:')) {
                            let jsonStr = line.replace(/^\s*data:\s*/, '').trim();
                            if (jsonStr === '[DONE]' || !jsonStr) continue;
                            
                            try {
                                let parsedChunk = JSON.parse(jsonStr);
                                if (parsedChunk.content !== undefined) {
                                    finalResponseText += parsedChunk.content;
                                } else if (parsedChunk.choices && parsedChunk.choices[0].delta && parsedChunk.choices[0].delta.content !== undefined) {
                                    finalResponseText += parsedChunk.choices[0].delta.content;
                                }
                                if (parsedChunk.error) {
                                    serverError = parsedChunk.error;
                                }
                            } catch (parseError) {
                                // تجاهل الأخطاء العابرة أثناء البث
                            }
                        }
                    }
                }
                
                document.getElementById(loadingId).remove();

                if (finalResponseText) {
                    appendMessage(finalResponseText, 'bot-msg');
                } else if (serverError) {
                    appendMessage('خطأ من السيرفر: ' + serverError, 'bot-msg');
                } else {
                    appendMessage('السيرفر أرسل رداً فارغاً.', 'bot-msg');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('فشل الاتصال بالخادم، تأكد من الإنترنت.', 'bot-msg');
                console.error('Error Details:', error);
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
