<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات بوت المساعد الذكي - WormGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --chat-bg: #15171e;
            --primary: #ff3344; 
            --primary-hover: #ff5566;
            --user-msg: #ff3344;
            --bot-msg: #212431;
            --text-light: #f1f2f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #252836;
        }

        #chat-header {
            background: linear-gradient(135deg, var(--primary), #b31020);
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(255, 51, 68, 0.2);
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #2f3542; border-radius: 10px; }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-in-out;
            white-space: pre-line; /* للحفاظ على السطور الجديدة والفقرات */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: var(--user-msg);
            color: #fff;
            align-self: flex-start;
            border-top-right-radius: 4px;
        }

        .bot-msg {
            background: var(--bot-msg);
            color: var(--text-light);
            align-self: flex-end;
            border-top-left-radius: 4px;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: #0d0e12;
            border-top: 1px solid #252836;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background: #212431;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            border: 1px solid #252836;
        }

        #user-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 51, 68, 0.2);
        }

        #send-btn {
            background: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(255, 51, 68, 0.3);
        }

        #send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .loading {
            align-self: flex-end;
            font-size: 0.85rem;
            color: #ff3344;
            background: transparent;
            padding: 0;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">🤖 WormGPT - الذكاء غير المقيد</div>
        <div id="chat-box">
            <div class="message bot-msg">أهلاً بك! تم إصلاح نظام القراءة، أنا جاهز تماماً للرد عليك الآن.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const apiKey = 'wgpt_yef3zqejl79bmhaj5k0ppdxtymolek3crq3tjoto';
        const modelName = 'wormgpt-uncensored';
        const apiUrl = 'https://corsproxy.io/?https://api.wormgpt.pw/v1/chat/completions';

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, 'user-msg');
            inputField.value = '';

            const chatBox = document.getElementById('chat-box');
            const loadingId = 'loading-' + Date.now();
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message loading';
            loadingMsg.id = loadingId;
            loadingMsg.textContent = 'جاري معالجة الرد... ⚡';
            chatBox.appendChild(loadingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [{ role: 'user', content: message }]
                    })
                });

                const responseText = await response.text();
                
                // هنا بنفك السطور المفرطة ونجمع الكلام
                let finalResponseText = "";
                let serverError = "";
                
                const lines = responseText.split('\n');
                for (let line of lines) {
                    let trimmedLine = line.trim();
                    if (trimmedLine.startsWith('data:')) {
                        let jsonStr = trimmedLine.substring(5).trim();
                        if (!jsonStr) continue;
                        
                        try {
                            let parsedChunk = JSON.parse(jsonStr);
                            if (parsedChunk.content) {
                                finalResponseText += parsedChunk.content;
                            }
                            if (parsedChunk.error) {
                                serverError = parsedChunk.error;
                            }
                        } catch (e) {
                            // تجاهل السطور الفارغة أو غير المكتملة
                        }
                    }
                }
                
                document.getElementById(loadingId).remove();

                if (finalResponseText.trim()) {
                    appendMessage(finalResponseText, 'bot-msg');
                } else if (serverError) {
                    appendMessage('خطأ من السيرفر: ' + serverError, 'bot-msg');
                } else {
                    appendMessage('السيرفر أرسل بيانات فارغة، تأكد من حسابك على الموقع.', 'bot-msg');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('فشل الاتصال تماماً بالخادم.', 'bot-msg');
                console.error('Error:', error);
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
